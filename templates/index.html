<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>美早樱桃货架期预测</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #18212f;
      --muted: #667085;
      --line: #d9e0ea;
      --primary: #0f766e;
      --primary-dark: #0b5d56;
      --accent: #b42318;
      --ok: #067647;
      --warn: #b54708;
      --bad: #b42318;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      width: min(1080px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 8px 28px rgba(16, 24, 40, 0.06);
    }

    .field {
      margin-bottom: 18px;
    }

    label,
    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 650;
    }

    .temperature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .temp-button {
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 15px;
      font-weight: 650;
      cursor: pointer;
    }

    .temp-button[aria-pressed="true"] {
      border-color: var(--primary);
      background: #e6f4f1;
      color: var(--primary-dark);
      box-shadow: inset 0 0 0 1px var(--primary);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 108px;
      gap: 10px;
    }

    input,
    select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 15px;
      color: var(--text);
      background: #fff;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.2);
      outline-offset: 2px;
    }

    .method-options {
      display: grid;
      gap: 8px;
    }

    .method-option {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
    }

    .method-option input {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .method-name {
      font-size: 14px;
      font-weight: 650;
    }

    .method-hint {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .submit {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit:disabled {
      opacity: 0.6;
      cursor: progress;
    }

    .result-empty {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 24px;
    }

    .result {
      display: none;
    }

    .result.visible {
      display: block;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfe;
      min-height: 88px;
    }

    .metric-title {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 24px;
      line-height: 1.1;
      font-weight: 750;
    }

    .unit {
      font-size: 13px;
      color: var(--muted);
      margin-left: 2px;
    }

    .risk-low { color: var(--ok); }
    .risk-medium { color: var(--warn); }
    .risk-high { color: var(--bad); }

    .section-title {
      margin: 16px 0 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .decision {
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      background: #eef6ff;
      color: #18466f;
      font-size: 14px;
      line-height: 1.6;
    }

    ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    pre {
      margin: 0;
      max-height: 220px;
      overflow: auto;
      padding: 12px;
      border-radius: 8px;
      background: #101828;
      color: #e4e7ec;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #fef3f2;
      color: var(--accent);
      font-size: 14px;
      line-height: 1.5;
    }

    .error.visible { display: block; }

    @media (max-width: 820px) {
      .page { padding: 22px 0; }
      .layout { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr; }
      .temperature-grid { grid-template-columns: repeat(2, 1fr); }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>美早樱桃货架期预测</h1>
      <p class="subtitle">选择贮藏温度，输入果实硬度，系统返回预计货架期、风险等级和建议。</p>
    </header>

    <div class="layout">
      <section class="panel" aria-label="预测输入">
        <form id="predictForm">
          <div class="field">
            <div class="label">贮藏温度</div>
            <div class="temperature-grid" id="temperatureGrid">
              {% for temp in fixed_temperatures_c %}
              <button class="temp-button" type="button" data-temp="{{ temp }}" aria-pressed="{{ 'true' if temp == 5 else 'false' }}">{{ temp }} ℃</button>
              {% endfor %}
            </div>
          </div>

          <div class="field">
            <label for="firmness">硬度</label>
            <div class="row">
              <input id="firmness" name="firmness" type="number" min="0.01" step="0.01" value="7.5" required>
              <select id="firmnessUnit" name="firmness_unit" aria-label="硬度单位">
                <option value="N">N</option>
                <option value="kgf">kgf</option>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="label">预测方法</div>
            <div class="method-options">
              <label class="method-option">
                <input type="radio" name="prediction_method" value="polynomial_regression" checked>
                <span class="method-name">多项式回归</span>
                <span class="method-hint">本地计算</span>
              </label>
              <label class="method-option">
                <input type="radio" name="prediction_method" value="llm_structured">
                <span class="method-name">LLM 结构化判断</span>
                <span class="method-hint">硅基流动</span>
              </label>
            </div>
          </div>

          <button class="submit" id="submitButton" type="submit">计算货架期</button>
          <div class="error" id="errorBox"></div>
        </form>
      </section>

      <section class="panel" aria-label="预测结果">
        <div class="result-empty" id="emptyState">输入温度和硬度后，结果会显示在这里。</div>
        <div class="result" id="resultBox">
          <div class="summary">
            <div class="metric">
              <div class="metric-title">预计货架期</div>
              <div class="metric-value"><span id="daysValue">-</span><span class="unit">天</span></div>
            </div>
            <div class="metric">
              <div class="metric-title">区间</div>
              <div class="metric-value"><span id="rangeValue">-</span></div>
            </div>
            <div class="metric">
              <div class="metric-title">风险等级</div>
              <div class="metric-value" id="riskValue">-</div>
            </div>
          </div>

          <div class="section-title">处理建议</div>
          <p class="decision" id="decisionText"></p>

          <div class="section-title">操作建议</div>
          <ul id="recommendations"></ul>

          <div class="section-title">结构化返回</div>
          <pre id="rawJson"></pre>
        </div>
      </section>
    </div>
  </main>

  <script>
    const temperatureButtons = Array.from(document.querySelectorAll('.temp-button'));
    const form = document.getElementById('predictForm');
    const submitButton = document.getElementById('submitButton');
    const errorBox = document.getElementById('errorBox');
    const emptyState = document.getElementById('emptyState');
    const resultBox = document.getElementById('resultBox');
    let selectedTemperature = 5;

    temperatureButtons.forEach((button) => {
      button.addEventListener('click', () => {
        selectedTemperature = Number(button.dataset.temp);
        temperatureButtons.forEach((item) => item.setAttribute('aria-pressed', String(item === button)));
      });
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.remove('visible');
      errorBox.textContent = '';
      submitButton.disabled = true;
      submitButton.textContent = '计算中...';

      const payload = {
        storage_temperature_c: selectedTemperature,
        firmness: Number(document.getElementById('firmness').value),
        firmness_unit: document.getElementById('firmnessUnit').value,
        prediction_method: new FormData(form).get('prediction_method'),
      };

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || data.error || '预测失败');
        }
        renderResult(data);
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.classList.add('visible');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = '计算货架期';
      }
    });

    function renderResult(data) {
      emptyState.style.display = 'none';
      resultBox.classList.add('visible');
      document.getElementById('daysValue').textContent = data.estimated_shelf_life_days;
      document.getElementById('rangeValue').textContent = `${data.shelf_life_range_days.min}-${data.shelf_life_range_days.max} 天`;
      const risk = document.getElementById('riskValue');
      risk.className = 'metric-value risk-' + data.risk_level;
      risk.textContent = riskLabel(data.risk_level);
      document.getElementById('decisionText').textContent = data.decision;

      const recommendations = document.getElementById('recommendations');
      recommendations.innerHTML = '';
      data.recommendations.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        recommendations.appendChild(li);
      });
      document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
    }

    function riskLabel(value) {
      if (value === 'low') return '低';
      if (value === 'medium') return '中';
      if (value === 'high') return '高';
      return value;
    }
  </script>
</body>
</html>
